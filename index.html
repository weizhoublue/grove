<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Grove Scale Test</title>
    <link rel="stylesheet" href="style.css?v=charts-v3">
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div>
          <h1>Grove Scale Test</h1>
          <p id="status">Loading runs...</p>
        </div>
        <a class="button" href="index/runs.ndjson" download>Download Runs as JSON</a>
      </header>

      <section class="controls" aria-label="Chart controls">
        <label>
          Test
          <select id="test-select"></select>
        </label>
      </section>

      <section class="charts" aria-label="Runtime charts">
        <article class="chart-panel">
          <header class="chart-panel-header">
            <h2>Total Runtime</h2>
            <div id="total-summary" class="summary"></div>
          </header>
          <div class="chart-frame">
            <svg id="total-chart" class="chart" role="img" aria-label="Total scale-test runtime over time"></svg>
          </div>
        </article>

        <article class="chart-panel">
          <header class="chart-panel-header">
            <h2>Phases</h2>
            <div id="phase-legend" class="legend"></div>
          </header>
          <div class="chart-frame">
            <svg id="phase-chart" class="chart" role="img" aria-label="Scale-test phase runtime by run"></svg>
          </div>
        </article>

        <div id="milestone-charts" class="milestone-charts"></div>
      </section>

      <section class="latest">
        <h2>Latest Values</h2>
        <table>
          <thead>
            <tr>
              <th>Metric</th>
              <th>Seconds</th>
              <th>Run</th>
            </tr>
          </thead>
          <tbody id="latest-body"></tbody>
        </table>
      </section>
    </main>
    <div id="tooltip" class="tooltip" hidden></div>
    <script src="app.js?v=charts-v3"></script>
  </body>
</html>
